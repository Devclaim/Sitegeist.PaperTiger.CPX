Sitegeist.PaperTiger.CPX:Form:
  ui:
    label: i18n
    icon: 'icon-list-alt'
    group: form.elements
    position: 10
    inlineEditable: true
    inspector:
      groups:
        'form':
          label: i18n
          position: 30
          icon: 'icon-list-alt'
  properties:
    formMode:
      type: Sitegeist\PaperTiger\CPX\Components\Form\FormMode
      defaultValue: 'standard'
      ui:
        label: 'Form mode'
        reloadIfChanged: true
        inspector:
          group: 'form'
          position: 10
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
  postprocessors:
    enumFormMode:
      postprocessor: Vendor\Shared\Application\EnumProvider
      postprocessorOptions:
        enumName: Sitegeist\PaperTiger\CPX\Components\Form\FormMode
        propertyNames:
          - formMode
  superTypes:
    Neos.Neos:Content: true
  childNodes:
    fields:
      type: Sitegeist.PaperTiger.CPX:Field.Collection
    actions:
      type: Sitegeist.PaperTiger.CPX:Action.Collection
